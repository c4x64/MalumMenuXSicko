name: MalumMenu Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x 

    - name: Restore Dependencies
      run: dotnet restore MalumMenu.sln

    - name: Build Solution
      run: dotnet build MalumMenu.sln --configuration Release --no-restore

    - name: Upload MalumMenu DLL
      uses: actions/upload-artifact@v4
      with:
        name: MalumMenu-Release
        # This searches the src folder's output for your compiled DLL
        path: src/bin/Release/**/MalumMenu.dll